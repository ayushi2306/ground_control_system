<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="home_style.css">
</head>
<body>
    <div class="background"></div>
    <h1 class="main">Telementry Monitor</h1>
    <section class="hero"></section>
    <section class="config">
        <div class="card">
            <h2>Connection Settings</h2>

            <label>COM Port</label>
            <select>
                <option>COM1</option>
                <option>COM2</option>
                <option>COM3</option>
                <option>COM5</option>
            </select>

            <label>Baud Rate</label>
            <select>
                <option>9600</option>
                <option>19200</option>
                <option>38400</option>
                <option>57600</option>
                <option>115200</option>
            </select>

            <button onclick="window.open('dashboard.html','_blank')">Connect</button>
            <button onclick="window.open('preflight.html','_blank')" style="margin-left: 8px;">Pre-Flight Planner</button>
        </div>
    </section>
</body>
</html>
